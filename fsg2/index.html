<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>물리 기반 유체 미디어 아트</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #fff; font-size: 12px; letter-spacing: 1px; pointer-events: none;
            opacity: 0.6; text-transform: uppercase;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">Fluid Physics: Viscosity & Vorticity Simulation<br>Space: Reset | C: Palette | S: Capture</div>
    <canvas id="canvas"></canvas>

<script>
/**
 * [핵심 로직]
 * 1. Grid (속도장): 화면을 격자로 나누어 각 칸에 유체의 '흐름 방향'을 저장합니다.
 * 2. Viscosity (점성): 흐름이 급격히 변하지 않고 주변과 동기화되게 합니다.
 * 3. Diffusion (확산): 색상 입자가 흐름에 따라 자연스럽게 퍼집니다.
 * 4. Vorticity (소용돌이): 마우스 움직임에 따라 회전력을 부여합니다.
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
const gridResolution = 20; // 격자 크기 (작을수록 정교하지만 무거워짐)
let grid = []; // 속도장 데이터
let hue = 200;

// 1. 초기화 및 리사이즈
function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    
    // 격자 생성 (각 칸에 x, y 방향의 힘 저장)
    const cols = Math.ceil(width / gridResolution);
    const rows = Math.ceil(height / gridResolution);
    grid = [];
    for (let i = 0; i < cols; i++) {
        grid[i] = [];
        for (let j = 0; j < rows; j++) {
            grid[i][j] = { vx: 0, vy: 0 };
        }
    }
}

// 2. 유체 입자 클래스
class FluidParticle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 2 + 2;
        this.life = 1.0; // 생명력 (1.0 -> 0.0)
        this.decay = Math.random() * 0.01 + 0.005;
    }

    update() {
        // 현재 위치가 속도장의 어느 격자에 있는지 계산
        const col = Math.floor(this.x / gridResolution);
        const row = Math.floor(this.y / gridResolution);

        if (grid[col] && grid[col][row]) {
            const force = grid[col][row];
            // 격자의 힘(속도장)을 입자에 반영 (점성 효과 흉내)
            this.x += force.vx;
            this.y += force.vy;
        }

        this.life -= this.decay;
    }

    draw() {
        ctx.fillStyle = `hsla(${this.color}, 80%, 60%, ${this.life})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 3. 마우스 상호작용 (속도장에 힘 주입)
let lastMouse = { x: 0, y: 0 };
window.addEventListener('mousemove', (e) => {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    
    // 마우스 근처 격자들에 힘과 소용돌이 부여
    const col = Math.floor(e.clientX / gridResolution);
    const row = Math.floor(e.clientY / gridResolution);
    const range = 3; // 영향 범위

    for (let i = -range; i <= range; i++) {
        for (let j = -range; j <= range; j++) {
            if (grid[col + i] && grid[col + i][row + j]) {
                const cell = grid[col + i][row + j];
                // 속도 주입 (속도장 형성)
                cell.vx += dx * 0.1;
                cell.vy += dy * 0.1;
            }
        }
    }

    // 움직이는 동안 입자 생성
    for (let i = 0; i < 5; i++) {
        particles.push(new FluidParticle(
            e.clientX + (Math.random() - 0.5) * 20,
            e.clientY + (Math.random() - 0.5) * 20,
            hue
        ));
    }

    lastMouse = { x: e.clientX, y: e.clientY };
});

// 4. 메인 애니메이션 루프
function animate() {
    // 잔상 효과 (흐려지며 사라짐)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    ctx.fillRect(0, 0, width, height);

    // 속도장 업데이트 (점성 및 감쇠)
    for (let i = 0; i < grid.length; i++) {
        for (let j = 0; j < grid[i].length; j++) {
            const cell = grid[i][j];
            
            // 공기 저항 및 점성: 속도가 서서히 줄어들며 부드러워짐
            cell.vx *= 0.95;
            cell.vy *= 0.95;

            // 소용돌이 흉내: 주변 격자와 힘을 조금씩 나눔 (확산)
            if (i > 0 && i < grid.length - 1 && j > 0 && j < grid[i].length - 1) {
                const neighborAvgX = (grid[i-1][j].vx + grid[i+1][j].vx + grid[i][j-1].vx + grid[i][j+1].vx) / 4;
                cell.vx += (neighborAvgX - cell.vx) * 0.05;
            }
        }
    }

    // 입자 업데이트 및 그리기
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    hue += 0.5;
    requestAnimationFrame(animate);
}

// 초기 실행 및 유틸리티 기능
init();
animate();
window.addEventListener('resize', init);
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { particles = []; init(); }
    if (e.code === 'KeyC') hue = Math.random() * 360;
    if (e.code === 'KeyS') {
        const link = document.createElement('a');
        link.download = 'fluid-art.png';
        link.href = canvas.toDataURL();
        link.click();
    }
});
</script>
</body>
</html>
